services:
  db:
      image: mysql:latest 
      container_name: mysql-db
      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
        MYSQL_DATABASE: ${MYSQL_DATABASE}
      restart: always
      ports:
        - "3309:3306"
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 60s
        timeout: 20s
        retries: 3
      volumes:
        - ecomm-data:/var/lib/mysql
      networks:
        - ecomm-network

  web-app:
      image: sandippatil6696/ecommerce-web-app:v1
      container_name: springboot-webapp
      ports:
        - "8080:8080"
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
        SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
        SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      depends_on:
        db:
          condition: service_healthy
      networks:
        - ecomm-network



volumes:
  ecomm-data:
  

networks:
  ecomm-network:
    driver: bridge

